<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lucky 13 Casino – Dashboard</title>

    <link rel="stylesheet" href="assets/css/dashboard.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0b0f19;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #111827, #0d0f1a);
            border-right: 2px solid #1f2937;
            padding: 20px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.4);
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
            letter-spacing: 1px;
            color: #facc15;
        }

        .game-list a {
            display: block;
            padding: 12px 15px;
            margin: 8px 0;
            background: #1f2937;
            border-radius: 8px;
            text-decoration: none;
            color: #e5e7eb;
            font-size: 16px;
            transition: 0.2s;
        }

        .game-list a:hover {
            background: #facc15;
            color: #111;
            transform: translateX(5px);
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .logo img {
            width: 180px;
            display: block;
            margin: 0 auto 20px;
        }

        .card {
            background: #1f2937;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .card h2 {
            margin: 0 0 10px;
            color: #facc15;
        }

        .reward-btn {
            background: #facc15;
            color: #111;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .reward-btn:hover {
            background: #ffe55c;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🎰 Lucky 13 Casino</h2>

        <div class="game-list">
            <a href="game/blackjack.html">🂡 Blackjack</a>
            <a href="game/slots.html">🎰 Slots</a>
            <a href="game/roulette.html">🎡 Roulette</a>
            <a href="game/plinko.html">🟡 Plinko</a>
            <a href="game/poker.html">♠ Texas Hold’em</a>
            <a href="game/threecard.html">♦ Three Card Poker</a>
            <a href="game/craps.html">🎲 Craps</a>
            <a href="game/mines.html">💣 Mines</a>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- LOGO -->
        <div class="logo">
            <img src="assets/images/casino-13.png" alt="Lucky 13 Logo">
        </div>

        <!-- USER INFO -->
        <div class="card">
            <h2>Welcome, <span id="usernameDisplay"></span></h2>
            <p>Balance: <span id="balanceDisplay"></span> tokens</p>
        </div>

        <!-- DAILY REWARD -->
        <div class="card">
            <h2>Daily Reward</h2>
            <p>Claim your free daily bonus!</p>
            <button class="reward-btn" onclick="claimReward()">Claim +250</button>
            <p id="rewardStatus"></p>
        </div>

    </div>

    <script>
        const API = "https://gambling-site-production.up.railway.app";

        // 🔒 SESSION CHECK (cookie-based)
        async function checkSession() {
            const res = await fetch(`${API}/api/session`, {
                credentials: "include"
            });

            const data = await res.json();

            if (!data.valid) {
                window.location.href = "login.html";
            }
        }

        // 📌 LOAD USER DATA
        async function loadDashboard() {
            await checkSession();

            // Fetch username
            const userRes = await fetch(`${API}/api/me`, {
                credentials: "include"
            });
            const userData = await userRes.json();

            // Fetch balance
            const balanceRes = await fetch(`${API}/api/balance`, {
                credentials: "include"
            });
            const balanceData = await balanceRes.json();

            // Update UI
            document.getElementById("usernameDisplay").textContent = userData.username;
            document.getElementById("balanceDisplay").textContent = balanceData.balance;
        }

        // 🎁 DAILY REWARD
        async function claimReward() {
            const res = await fetch(`${API}/api/refill`, {
                method: "POST",
                credentials: "include"
            });

            const data = await res.json();

            document.getElementById("rewardStatus").textContent = data.message;
            document.getElementById("balanceDisplay").textContent = data.balance;
        }

        // 🚪 LOGOUT
        async function logout() {
            await fetch(`${API}/api/logout`, {
                method: "POST",
                credentials: "include"
            });

            window.location.href = "login.html";
        }

        loadDashboard();
    </script>

</body>
</html>
