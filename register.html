<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 Casino – Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: #f2d57c;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .register-box {
        background: rgba(10, 10, 10, 0.95);
        padding: 30px;
        border-radius: 12px;
        width: 340px;
        text-align: center;
        border: 2px solid #f2d57c;
        box-shadow: 0 0 20px #f2d57c;
    }

    .register-box h2 {
        margin-bottom: 20px;
        font-size: 28px;
        letter-spacing: 2px;
        text-shadow: 0 0 10px #f2d57c;
    }

    .register-box input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 6px;
        border: none;
        background: #111;
        color: #f2d57c;
        font-size: 16px;
        border: 1px solid #333;
    }

    .register-box input:focus {
        outline: none;
        border-color: #f2d57c;
        box-shadow: 0 0 10px #f2d57c;
    }

    .register-box button {
        width: 100%;
        padding: 12px;
        background: #f2d57c;
        border: none;
        border-radius: 6px;
        color: #000;
        font-size: 18px;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
    }

    .register-box button:hover {
        background: #c9b15f;
    }

    .register-box a {
        color: #f2d57c;
        text-decoration: none;
        display: block;
        margin-top: 15px;
        font-size: 16px;
    }

    .register-box a:hover {
        text-shadow: 0 0 10px #f2d57c;
    }
</style>
</head>
<body>

<div class="register-box">
    <h2>Create Account</h2>

    <form id="registerForm">
        <input id="username" type="text" placeholder="Username" required>
        <input id="password" type="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <a href="login.html">Already have an account?</a>
</div>

<script>
const API = "gambling-site-production.up.railway.app"; // IMPORTANT — replace this

document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
        const response = await fetch(API + "/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.error) {
            alert(data.error);
            return;
        }

        // Store token instantly
        localStorage.setItem("token", data.token);

        // Redirect instantly
        window.location.href = "game/index.html";

    } catch (err) {
        alert("Server error. Check backend logs.");
        console.error(err);
    }
});
</script>

</body>
</html>
