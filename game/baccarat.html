<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Baccarat – Lucky 13 Casino</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #022;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 10px 20px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }
    .balance {
      font-weight: bold;
    }
    main {
      max-width: 800px;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      margin-top: 0;
      text-align: center;
    }
    .bet-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .bet-row button {
      padding: 8px 16px;
      border: none;
      background: #333;
      color: #fff;
      cursor: pointer;
      border-radius: 4px;
    }
    .bet-row button:hover {
      background: #555;
    }
    .cards-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0;
    }
    .hand {
      text-align: center;
    }
    .cards {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: center;
    }
    .card {
      width: 60px;
      height: 90px;
      border-radius: 6px;
      background: #fff;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    #result {
      margin-top: 15px;
      text-align: center;
      min-height: 40px;
    }
    #controls {
      text-align: center;
      margin-top: 10px;
    }
    #controls button {
      padding: 8px 16px;
      border: none;
      background: #444;
      color: #fff;
      cursor: pointer;
      border-radius: 4px;
    }
    #controls button:hover {
      background: #666;
    }
  </style>
</head>
<body>
<header>
  <div>Lucky 13 Casino – Baccarat</div>
  <div class="balance">Balance: $<span id="balance">1000</span></div>
</header>

<main>
  <h1>Baccarat</h1>

  <div class="bet-row">
    <button onclick="setBet('player')">Bet Player ($10)</button>
    <button onclick="setBet('banker')">Bet Banker ($10)</button>
    <button onclick="setBet('tie')">Bet Tie ($10)</button>
  </div>

  <div id="controls">
    <button onclick="playRound()">Deal Round</button>
  </div>

  <div class="cards-row">
    <div class="hand">
      <h3>Player</h3>
      <div class="cards" id="player-cards"></div>
      <div id="player-score"></div>
    </div>
    <div class="hand">
      <h3>Banker</h3>
      <div class="cards" id="banker-cards"></div>
      <div id="banker-score"></div>
    </div>
  </div>

  <div id="result"></div>
</main>
