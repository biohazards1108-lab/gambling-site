<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading Lucky 13...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #f2d57c;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        overflow: hidden;
    }

    .logo-img {
        width: 260px;
        height: auto;
        margin-bottom: 25px;
        filter: drop-shadow(0 0 20px #f2d57c);
        animation: fadeIn 1.5s ease-in-out forwards;
        opacity: 0;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    .spinner {
        width: 80px;
        height: 80px;
        border: 6px solid #333;
        border-top-color: #f2d57c;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .coin {
        position: fixed;
        top: -50px;
        width: 40px;
        height: 40px;
        background-image: url("../assets/images/coin.png");
        background-size: cover;
        animation: fall linear infinite;
        opacity: 0.8;
        z-index: 10;
    }

    @keyframes fall {
        0% { transform: translateY(-100px) rotate(0deg); }
        100% { transform: translateY(110vh) rotate(360deg); }
    }
</style>
</head>
<body>

<img src="../assets/casino-13.png" class="logo-img" alt="Lucky 13 Logo">
<div class="spinner"></div>

<script>
for (let i = 0; i < 20; i++) {
    const coin = document.createElement("div");
    coin.classList.add("coin");
    coin.style.left = Math.random() * 100 + "vw";
    coin.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(coin);
}

// after logo + spinner, go to login
setTimeout(() => {
    window.location.href = "../login.html";
}, 2500);
</script>

</body>
</html>
