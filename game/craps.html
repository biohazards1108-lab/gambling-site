<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lucky 13 Casino – Craps</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at top, #111111 0%, #050505 50%, #000000 100%);
    color: #f9f3d7;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: #050608;
    border-bottom: 1px solid #262626;
}

.top-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.top-left img {
    height: 36px;
    border-radius: 6px;
    border: 1px solid #f5c451;
}

.top-left h1 {
    font-size: 1.2rem;
    color: #f5c451;
}

.top-right {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.85rem;
}

.wallet-pill {
    padding: 6px 12px;
    border-radius: 999px;
    background: #101010;
    border: 1px solid #3a3a3a;
}

.wallet-pill span.value {
    color: #f5c451;
}

.back-link {
    color: #e0d7ff;
    text-decoration: none;
    font-weight: 600;
}

/* TABLE AREA */
.table-wrapper {
    max-width: 900px;
    margin: 24px auto;
    padding: 0 24px 40px;
    text-align: center;
}

.table-title {
    font-size: 1.4rem;
    margin-bottom: 8px;
}

.table-subtitle {
    font-size: 0.95rem;
    color: #d0c7ff;
    margin-bottom: 16px;
}

/* Craps Table */
.craps-table {
    background: radial-gradient(circle at top, #0b3b2f 0%, #062019 40%, #020b08 100%);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    border: 1px solid #0f2c23;
}

/* Dice */
.dice-area {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
}

.die {
    width: 80px;
    height: 80px;
    background: #fff;
    border-radius: 12px;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 700;
    color: #222;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: transform 0.3s;
}

/* Controls */
.controls {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.btn {
    padding: 10px 24px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
}

.btn-primary {
    background: linear-gradient(135deg, #f5c451, #ff6bcb);
    color: #050505;
}

.btn-secondary {
    background: transparent;
    border: 1px solid #f5c451;
    color: #f5c451;
}

.btn-secondary:hover {
    background: #f5c451;
    color: #050505;
}

/* Status */
.status {
    margin-top: 16px;
    font-size: 1rem;
    color: #f9f3d7;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="top-left">
        <img src="assets/images/logo.png" alt="Lucky 13 Logo" />
        <h1>Lucky 13 Craps</h1>
    </div>
    <div class="top-right">
        <a href="index.html" class="back-link">← Back to Lobby</a>
        <div class="wallet-pill">Balance: <span id="balance" class="value">$0</span></div>
        <div class="wallet-pill">Bet: <span id="bet" class="value">$50</span></div>
    </div>
</div>

<div class="table-wrapper">
    <div class="table-title">Craps – Pass Line</div>
    <div class="table-subtitle">Roll the dice. Win on 7 or 11. Lose on 2, 3, 12. Otherwise set the point.</div>

    <div class="craps-table">
        <div class="dice-area">
            <div id="die1" class="die">🎲</div>
            <div id="die2" class="die">🎲</div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="rollDice()">ROLL ($50)</button>
        </div>

        <div id="status" class="status">Click ROLL to begin.</div>
    </div>
</div>

<script>
/* ---------------- BACKEND CONNECTION ---------------- */

const API = "https://gambling-site-production.up.railway.app";

async function fetchBalance() {
    const res = await fetch(`${API}/balance`);
    const data = await res.json();
    balance = data.balance;
    document.getElementById("balance").textContent = "$" + balance;
}

async function updateBalance(delta) {
    const res = await fetch(`${API}/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ delta })
    });
    const data = await res.json();
    balance = data.balance;
    document.getElementById("balance").textContent = "$" + balance;
}

/* ---------------- GAME LOGIC ---------------- */

let balance = 0;
const betAmount = 50;
let point = null;

document.getElementById("bet").textContent = "$" + betAmount;

function rollDie() {
    return Math.floor(Math.random() * 6) + 1;
}

async function rollDice() {
    const status = document.getElementById("status");

    await fetchBalance();

    if (balance < betAmount) {
        status.textContent = "Not enough balance.";
        return;
    }

    await updateBalance(-betAmount);

    const d1 = rollDie();
    const d2 = rollDie();
    const total = d1 + d2;

    const die1 = document.getElementById("die1");
    const die2 = document.getElementById("die2");

    die1.style.transform = "rotate(360deg)";
    die2.style.transform = "rotate(-360deg)";

    setTimeout(() => {
        die1.textContent = d1;
        die2.textContent = d2;
    }, 300);

    let win = 0;

    if (point === null) {
        // Come-out roll
        if (total === 7 || total === 11) {
            win = betAmount * 2;
            status.textContent = `You rolled ${total}. WIN!`;
        } else if (total === 2 || total === 3 || total === 12) {
            status.textContent = `You rolled ${total}. CRAPS! You lose.`;
        } else {
            point = total;
            status.textContent = `Point is set to ${point}. Roll again.`;
        }
    } else {
        // Point phase
        if (total === point) {
            win = betAmount * 2;
            status.textContent = `You rolled ${total}. HIT THE POINT! You win!`;
            point = null;
        } else if (total === 7) {
            status.textContent = `You rolled 7. SEVEN OUT! You lose.`;
            point = null;
        } else {
            status.textContent = `You rolled ${total}. Keep rolling...`;
        }
    }

    await updateBalance(win);
}

fetchBalance();
</script>

</body>
</html>
