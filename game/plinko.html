<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lucky 13 Casino – Plinko</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at top, #111111 0%, #050505 50%, #000000 100%);
    color: #f9f3d7;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: #050608;
    border-bottom: 1px solid #262626;
}

.top-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.top-left img {
    height: 36px;
    border-radius: 6px;
    border: 1px solid #f5c451;
}

.top-left h1 {
    font-size: 1.2rem;
    color: #f5c451;
}

.top-right {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.85rem;
}

.wallet-pill {
    padding: 6px 12px;
    border-radius: 999px;
    background: #101010;
    border: 1px solid #3a3a3a;
}

.wallet-pill span.value {
    color: #f5c451;
}

.back-link {
    color: #e0d7ff;
    text-decoration: none;
    font-weight: 600;
}

/* PLINKO BOARD */
.plinko-wrapper {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 24px 40px;
    text-align: center;
}

.plinko-title {
    font-size: 1.4rem;
    margin-bottom: 8px;
}

.plinko-subtitle {
    font-size: 0.95rem;
    color: #d0c7ff;
    margin-bottom: 20px;
}

.board {
    width: 400px;
    height: 500px;
    background: #000;
    border: 3px solid #f5c451;
    border-radius: 12px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
}

.peg {
    width: 12px;
    height: 12px;
    background: #f5c451;
    border-radius: 50%;
    position: absolute;
}

.ball {
    width: 18px;
    height: 18px;
    background: #ff6bcb;
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 190px;
}

/* Slots */
.slot-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
}

.slot {
    width: 60px;
    height: 40px;
    background: #050608;
    border: 2px solid #f5c451;
    border-radius: 6px;
    color: #f5c451;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
}

/* Controls */
.controls {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.btn {
    padding: 10px 24px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
}

.btn-primary {
    background: linear-gradient(135deg, #f5c451, #ff6bcb);
    color: #050505;
}

.btn-primary:hover {
    box-shadow: 0 0 18px rgba(255,107,203,0.7);
}

/* Status */
.status {
    margin-top: 16px;
    font-size: 1rem;
    color: #f9f3d7;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="top-left">
        <img src="assets/images/logo.png" alt="Lucky 13 Logo" />
        <h1>Lucky 13 Plinko</h1>
    </div>
    <div class="top-right">
        <a href="index.html" class="back-link">← Back to Lobby</a>
        <div class="wallet-pill">Balance: <span id="balance" class="value">$0</span></div>
        <div class="wallet-pill">Bet: <span id="bet" class="value">$50</span></div>
    </div>
</div>

<div class="plinko-wrapper">
    <div class="plinko-title">Plinko – Drop the Ball</div>
    <div class="plinko-subtitle">Real physics, multipliers, and backend balance.</div>

    <div class="board" id="board"></div>

    <div class="slot-row">
        <div class="slot">0.5x</div>
        <div class="slot">1x</div>
        <div class="slot">2x</div>
        <div class="slot">5x</div>
        <div class="slot">10x</div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" onclick="dropBall()">DROP ($50)</button>
    </div>

    <div id="status" class="status">Press DROP to play.</div>
</div>

<script>
/* ---------------- BACKEND CONNECTION ---------------- */

const API = "https://gambling-site-production.up.railway.app";

async function fetchBalance() {
    const res = await fetch(`${API}/balance`);
    const data = await res.json();
    balance = data.balance;
    document.getElementById("balance").textContent = "$" + balance;
}

async function updateBalance(delta) {
    const res = await fetch(`${API}/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ delta })
    });
    const data = await res.json();
    balance = data.balance;
    document.getElementById("balance").textContent = "$" + balance;
}

/* ---------------- GAME LOGIC ---------------- */

let balance = 0;
const betAmount = 50;

document.getElementById("bet").textContent = "$" + betAmount;

const multipliers = [0.5, 1, 2, 5, 10];

function createBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";

    // Create pegs
    for (let row = 0; row < 10; row++) {
        for (let col = 0; col <= row; col++) {
            const peg = document.createElement("div");
            peg.className = "peg";
            peg.style.top = `${row * 40 + 40}px`;
            peg.style.left = `${200 - row * 20 + col * 40}px`;
            board.appendChild(peg);
        }
    }
}

async function dropBall() {
    const status = document.getElementById("status");

    await fetchBalance();

    if (balance < betAmount) {
        status.textContent = "Not enough balance.";
        return;
    }

    await updateBalance(-betAmount);

    const board = document.getElementById("board");
    const ball = document.createElement("div");
    ball.className = "ball";
    board.appendChild(ball);

    let x = 190;
    let y = 0;

    const interval = setInterval(() => {
        y += 10;

        // Random bounce left/right
        x += (Math.random() < 0.5 ? -10 : 10);

        ball.style.top = y + "px";
        ball.style.left = x + "px";

        if (y > 450) {
            clearInterval(interval);
            const slotIndex = Math.min(
                multipliers.length - 1,
                Math.max(0, Math.floor((x - 100) / 60))
            );

            const multiplier = multipliers[slotIndex];
            const win = betAmount * multiplier;

            updateBalance(win);

            status.textContent = `Ball landed in ${multiplier}x slot. Win: $${win}`;
        }
    }, 50);
}

createBoard();
fetchBalance();
</script>

</body>
</html>
