<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 – Multiplayer Blackjack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        color: #f2d57c;
        background: radial-gradient(circle at top, #0b3b2e 0%, #02110c 60%, #000 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 40px;
        text-shadow: 0 0 20px #f2d57c;
    }

    #top-bar {
        margin-top: 10px;
        display: flex;
        gap: 15px;
        align-items: center;
        background: rgba(0,0,0,0.4);
        padding: 10px 20px;
        border-radius: 12px;
        border: 1px solid #f2d57c;
    }

    #balance {
        font-size: 18px;
    }

    #refill-btn {
        padding: 6px 14px;
        font-size: 14px;
        background: #f2d57c;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #000;
        transition: 0.3s;
    }

    #refill-btn:hover {
        background: #c9b15f;
    }

    .table-wrapper {
        margin-top: 30px;
        width: 90%;
        max-width: 900px;
        height: 500px;
        background: radial-gradient(circle at top, #145c3f 0%, #0b3b2e 40%, #052019 80%);
        border-radius: 260px;
        border: 4px solid #c9b15f;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        position: relative;
        padding-top: 60px;
    }

    .dealer-area {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        color: #fff;
    }

    .dealer-cards {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        justify-content: center;
    }

    .card {
        width: 60px;
        height: 90px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 18px;
    }

    .seats {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        display: flex;
        justify-content: space-between;
    }

    .seat {
        width: 120px;
        text-align: center;
        color: #fff;
    }

    .player-name {
        margin-bottom: 5px;
        font-size: 14px;
    }

    .player-cards {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-bottom: 5px;
    }

    .player-bet {
        font-size: 13px;
        color: #f2d57c;
    }

    .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        justify-content: center;
    }

    .btn {
        padding: 8px 18px;
        font-size: 16px;
        background: #f2d57c;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #000;
        transition: 0.3s;
    }

    .btn:hover {
        background: #c9b15f;
    }

    #chat {
        margin-top: 20px;
        width: 90%;
        max-width: 600px;
        background: rgba(0,0,0,0.5);
        border-radius: 10px;
        padding: 10px;
        color: #fff;
        font-size: 14px;
    }

    #messages {
        max-height: 150px;
        overflow-y: auto;
        margin-bottom: 10px;
    }

    #result {
        margin-top: 10px;
        font-size: 18px;
        text-shadow: 0 0 10px #f2d57c;
        min-height: 24px;
        text-align: center;
    }
</style>
</head>
<body>

<h1>Lucky 13 Blackjack</h1>

<div id="top-bar">
    <div id="balance">Balance: loading...</div>
    <button id="refill-btn" onclick="refill()">Refill (max 1000)</button>
</div>

<div class="table-wrapper">
    <div class="dealer-area">
        <div>Dealer</div>
        <div class="dealer-cards" id="dealer-cards"></div>
    </div>

    <div class="seats" id="seats"></div>
</div>

<div class="controls">
    <input type="number" id="bet-amount" placeholder="Bet" min="10" max="1000" value="50">
    <button class="btn" onclick="placeBet()">Place Bet</button>
    <button class="btn" onclick="hit()">Hit</button>
    <button class="btn" onclick="stand()">Stand</button>
</div>

<div id="result"></div>

<div id="chat">
    <div id="messages"></div>
    <input type="text" id="chat-input" placeholder="Type message..." style="width:80%;">
    <button class="btn" style="padding:4px 10px;font-size:14px;" onclick="sendChat()">Send</button>
</div>

<script src="https://gambling-site-production.up.railway.app/socket.io/socket.io.js"></script>
<script>
const API_BASE = "https://gambling-site-production.up.railway.app";
const token = localStorage.getItem("token");
const username = localStorage.getItem("username") || "Player";

async function loadBalance() {
    const el = document.getElementById("balance");
    if (!token) {
        el.textContent = "Balance: login required";
        return;
    }
    try {
        const res = await fetch(`${API_BASE}/api/balance`, {
            headers: { "Authorization": token }
        });
        const data = await res.json();
        el.textContent = "Balance: " + data.balance;
    } catch {
        el.textContent = "Balance: error";
    }
}

async function refill() {
    if (!token) {
        alert("Login required");
        return;
    }
    try {
        const res = await fetch(`${API_BASE}/api/refill`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": token
            }
        });
        const data = await res.json();
        document.getElementById("balance").textContent = "Balance: " + data.balance;
        document.getElementById("result").textContent = data.message || "";
    } catch {
        document.getElementById("result").textContent = "Refill error";
    }
}

document.addEventListener("DOMContentLoaded", loadBalance);

// Socket.IO
const socket = io(API_BASE);
const roomId = "main-table";

socket.on("connect", () => {
    socket.emit("joinRoom", { roomId, username });
});

socket.on("roomUpdate", (room) => {
    renderRoom(room);
});

socket.on("chatMessage", ({ username, message }) => {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.textContent = username + ": " + message;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
});

function renderRoom(room) {
    // dealer
    const dealerEl = document.getElementById("dealer-cards");
    dealerEl.innerHTML = "";
    room.dealer.forEach(card => {
        const c = document.createElement("div");
        c.className = "card";
        c.textContent = card.value + card.suit;
        dealerEl.appendChild(c);
    });

    // players
    const seatsEl = document.getElementById("seats");
    seatsEl.innerHTML = "";
    room.players.forEach(p => {
        const seat = document.createElement("div");
        seat.className = "seat";

        const name = document.createElement("div");
        name.className = "player-name";
        name.textContent = p.username;

        const cards = document.createElement("div");
        cards.className = "player-cards";
        p.hand.forEach(card => {
            const c = document.createElement("div");
            c.className = "card";
            c.textContent = card.value + card.suit;
            cards.appendChild(c);
        });

        const bet = document.createElement("div");
        bet.className = "player-bet";
        bet.textContent = "Bet: " + (p.bet || 0);

        seat.appendChild(name);
        seat.appendChild(cards);
        seat.appendChild(bet);
        seatsEl.appendChild(seat);
    });

    if (room.state === "finished") {
        document.getElementById("result").textContent = "Round finished";
    } else if (room.state === "playing") {
        document.getElementById("result").textContent = "Round in progress";
    } else {
        document.getElementById("result").textContent = "Place your bets";
    }
}

function placeBet() {
    const amount = parseInt(document.getElementById("bet-amount").value, 10) || 0;
    socket.emit("placeBet", { roomId, amount });
}

function hit() {
    socket.emit("hit", roomId);
}

function stand() {
    socket.emit("stand", roomId);
}

function sendChat() {
    const input = document.getElementById("chat-input");
    const message = input.value.trim();
    if (!message) return;
    socket.emit("chat", { roomId, message, username });
    input.value = "";
}
</script>

</body>
</html>
