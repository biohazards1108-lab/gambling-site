<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 – Multiplayer Blackjack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: url("https://i.imgur.com/8fKQZ8U.jpeg") center/cover no-repeat fixed;
        font-family: Arial, sans-serif;
        color: #f2d57c;
        overflow-x: hidden;
    }

    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: -1;
    }

    h1 {
        margin-top: 20px;
        font-size: 46px;
        text-align: center;
        text-shadow: 0 0 20px #f2d57c;
    }

    #balance {
        text-align: center;
        margin-top: 10px;
        font-size: 22px;
        background: rgba(20,20,20,0.85);
        display: inline-block;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid #f2d57c;
    }

    .table-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 40px;
    }

    .table {
        width: 900px;
        height: 500px;
        background: radial-gradient(circle at top, #0b5b2a 0%, #05351a 60%, #000 100%);
        border-radius: 50% / 60%;
        border: 4px solid #c9b15f;
        box-shadow: 0 0 40px rgba(0,0,0,0.9);
        position: relative;
        padding-top: 60px;
    }

    .dealer-area {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
    }

    .dealer-area .hand {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .seat {
        position: absolute;
        width: 140px;
        text-align: center;
        color: #f2d57c;
        font-size: 14px;
    }

    .seat .name {
        margin-bottom: 5px;
    }

    .seat .hand {
        display: flex;
        justify-content: center;
        gap: 8px;
    }

    .card {
        width: 70px;
        height: 100px;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(0,0,0,0.7);
        background-size: cover;
        background-position: center;
    }

    /* Seat positions around the table */
    .seat-0 { top: 320px; left: 50%; transform: translateX(-50%); }
    .seat-1 { top: 280px; left: 200px; }
    .seat-2 { top: 280px; right: 200px; }
    .seat-3 { top: 180px; left: 120px; }
    .seat-4 { top: 180px; right: 120px; }

    .controls {
        text-align: center;
        margin-top: 20px;
    }

    button {
        padding: 10px 24px;
        font-size: 18px;
        background: #f2d57c;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 8px;
        transition: 0.3s;
        color: #000;
    }

    button:hover {
        background: #c9b15f;
    }

    #message {
        margin-top: 15px;
        font-size: 22px;
        text-align: center;
        text-shadow: 0 0 10px #f2d57c;
    }

    /* Chat */
    .chat-box {
        position: fixed;
        right: 20px;
        bottom: 20px;
        width: 260px;
        background: rgba(0,0,0,0.75);
        border: 2px solid #f2d57c;
        border-radius: 12px;
        padding: 10px;
        box-shadow: 0 0 20px rgba(242,213,124,0.4);
    }

    .chat-messages {
        height: 180px;
        overflow-y: auto;
        background: rgba(20,20,20,0.8);
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 10px;
        color: #fff;
        font-size: 14px;
    }

    .chat-input {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: none;
        background: #111;
        color: #f2d57c;
    }
</style>
</head>

<body>
<div class="overlay"></div>

<h1>Lucky 13 Multiplayer Blackjack</h1>
<div id="balance">Balance: loading...</div>

<div class="table-wrapper">
    <div class="table">

        <div class="dealer-area">
            <div>Dealer</div>
            <div class="hand" id="dealerHand"></div>
        </div>

        <!-- Seats -->
        <div class="seat seat-0">
            <div class="name" id="seat-0-name">You</div>
            <div class="hand" id="seat-0-hand"></div>
        </div>

        <div class="seat seat-1">
            <div class="name" id="seat-1-name"></div>
            <div class="hand" id="seat-1-hand"></div>
        </div>

        <div class="seat seat-2">
            <div class="name" id="seat-2-name"></div>
            <div class="hand" id="seat-2-hand"></div>
        </div>

        <div class="seat seat-3">
            <div class="name" id="seat-3-name"></div>
            <div class="hand" id="seat-3-hand"></div>
        </div>

        <div class="seat seat-4">
            <div class="name" id="seat-4-name"></div>
            <div class="hand" id="seat-4-hand"></div>
        </div>

    </div>
</div>

<div class="controls">
    <button onclick="startGame()">New Game</button>
    <button onclick="playerHit()">Hit</button>
    <button onclick="playerStand()">Stand</button>
</div>

<div id="message"></div>

<!-- Chat -->
<div class="chat-box">
    <div class="chat-messages" id="chatMessages"></div>
    <input class="chat-input" id="chatInput" placeholder="Type message..." onkeydown="sendChat(event)">
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const API = "https://gambling-site-production.up.railway.app";
const socket = io(API, { transports: ["websocket"] });

const roomId = "main-table";
const username = localStorage.getItem("username") || "Player" + Math.floor(Math.random()*999);

// Join room
socket.emit("joinRoom", { roomId, username });

// Update room
socket.on("roomUpdate", room => {
    renderRoom(room);
});

// Chat
socket.on("chatMessage", ({ username, message }) => {
    const box = document.getElementById("chatMessages");
    box.innerHTML += `<div><strong>${username}:</strong> ${message}</div>`;
    box.scrollTop = box.scrollHeight;
});

function sendChat(e) {
    if (e.key !== "Enter") return;
    const input = document.getElementById("chatInput");
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit("chat", { roomId, message: msg, username });
    input.value = "";
}

// Render table
function cardImage(card) {
    return `https://deckofcardsapi.com/static/img/${card.value}${card.suit}.png`;
}

function renderRoom(room) {
    // Dealer
    const dealerDiv = document.getElementById("dealerHand");
    dealerDiv.innerHTML = "";
    room.dealer.forEach(card => {
        dealerDiv.innerHTML += `<div class="card" style="background-image:url('${cardImage(card)}')"></div>`;
    });

    // Clear seats
    for (let i = 0; i < 5; i++) {
        document.getElementById(`seat-${i}-name`).innerText = "";
        document.getElementById(`seat-${i}-hand`).innerHTML = "";
    }

    // Render players
    room.players.forEach(p => {
        const nameEl = document.getElementById(`seat-${p.seat}-name`);
        const handEl = document.getElementById(`seat-${p.seat}-hand`);
        if (!nameEl || !handEl) return;

        nameEl.innerText = p.username;
        handEl.innerHTML = "";
        p.hand.forEach(card => {
            handEl.innerHTML += `<div class="card" style="background-image:url('${cardImage(card)}')"></div>`;
        });
    });

    // State message
    document.getElementById("message").innerText =
        room.state === "finished" ? "Round finished" : "";
}

// Buttons
function startGame() {
    socket.emit("startGame", roomId);
}

function playerHit() {
    socket.emit("hit", roomId);
}

function playerStand() {
    socket.emit("stand", roomId);
}
</script>

</body>
</html>
