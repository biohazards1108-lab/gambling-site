<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lucky 13 Casino – Blackjack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --accent: #d4af37;
            --text: #fff;
            --muted: #bbb;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 70%);
            font-family: system-ui, sans-serif;
            color: var(--text);
            text-align: center;
        }

        /* Logo */
        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .logo img {
            width: 120px;
        }

        /* Balance + Back */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .back {
            margin-left: 20px;
            color: var(--muted);
            cursor: pointer;
        }

        /* Game Table */
        .table {
            margin-top: 120px;
        }

        .hand {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .hand img {
            width: 100px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* Buttons */
        .controls {
            margin-top: 30px;
        }

        .controls button {
            padding: 12px 28px;
            margin: 10px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #000;
            transition: 0.25s;
        }

        .controls button:hover {
            background: #f7d76a;
        }

        /* Result */
        #result {
            margin-top: 20px;
            font-size: 1.4rem;
            color: var(--accent);
        }
    </style>
</head>

<body>

    <div class="logo">
        <img src="../assets/images/casino-13.png" alt="Lucky 13 Logo">
    </div>

    <div class="top-bar">
        Balance: <span id="balance">Loading...</span>
        <span class="back" onclick="window.location.href='index.html'">Back</span>
    </div>

    <div class="table">
        <h1>Blackjack</h1>

        <h2>Dealer</h2>
        <div id="dealer-hand" class="hand"></div>

        <h2>You</h2>
        <div id="player-hand" class="hand"></div>

        <div class="controls">
            <button onclick="hit()">Hit</button>
            <button onclick="stand()">Stand</button>
            <button onclick="startGame()">Restart</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const API = "https://gambling-site-production.up.railway.app";

        // -------------------------------
        // AUTH + BALANCE
        // -------------------------------
        async function loadBalance() {
            const token = localStorage.getItem("userToken");
            if (!token) return window.location.href = "../login.html";

            const res = await fetch(`${API}/api/balance`, {
                headers: { "Authorization": token }
            });

            const data = await res.json();
            document.getElementById("balance").innerText = data.balance ?? "error";
        }

        loadBalance();

        // -------------------------------
        // CARD SYSTEM (CDN images)
        // -------------------------------
        const suits = ["S", "H", "D", "C"];
        const ranks = ["A", "2", "3", "4", "5", "6", "7", "8", "9", "0", "J", "Q", "K"];

        function drawCard() {
            const suit = suits[Math.floor(Math.random() * suits.length)];
            const rank = ranks[Math.floor(Math.random() * ranks.length)];
            return rank + suit;
        }

        function getCardImage(code) {
            return `https://deckofcardsapi.com/static/img/${code}.png`;
        }

        function cardValue(code) {
            const rank = code[0];
            if (rank === "A") return 11;
            if (rank === "K" || rank === "Q" || rank === "J" || rank === "0") return 10;
            return parseInt(rank);
        }

        // -------------------------------
        // GAME LOGIC
        // -------------------------------
        let dealer = [];
        let player = [];

        function startGame() {
            dealer = [drawCard(), drawCard()];
            player = [drawCard(), drawCard()];

            renderHands();
            document.getElementById("result").innerText = "";
        }

        function renderHands() {
            const dealerDiv = document.getElementById("dealer-hand");
            const playerDiv = document.getElementById("player-hand");

            dealerDiv.innerHTML = "";
            playerDiv.innerHTML = "";

            dealer.forEach(card => {
                dealerDiv.innerHTML += `<img src="${getCardImage(card)}">`;
            });

            player.forEach(card => {
                playerDiv.innerHTML += `<img src="${getCardImage(card)}">`;
            });
        }

        function handValue(hand) {
            let total = 0;
            let aces = 0;

            hand.forEach(card => {
                total += cardValue(card);
                if (card[0] === "A") aces++;
            });

            while (total > 21 && aces > 0) {
                total -= 10;
                aces--;
            }

            return total;
        }

        function hit() {
            player.push(drawCard());
            renderHands();

            if (handValue(player) > 21) {
                document.getElementById("result").innerText = "Bust! You lose.";
            }
        }

        function stand() {
            while (handValue(dealer) < 17) {
                dealer.push(drawCard());
            }

            renderHands();

            const p = handValue(player);
            const d = handValue(dealer);

            if (d > 21 || p > d) {
                document.getElementById("result").innerText = "You win!";
            } else if (p === d) {
                document.getElementById("result").innerText = "Push!";
            } else {
                document.getElementById("result").innerText = "Dealer wins.";
            }
        }

        startGame();
    </script>

</body>
</html>
