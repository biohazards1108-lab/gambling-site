<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 – Blackjack</title>
<link rel="stylesheet" href="../assets/css/game.css">

<style>
    body {
        margin: 0;
        background: #0b0f19;
        font-family: 'Segoe UI', sans-serif;
        color: #fff;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        padding: 20px;
        background: #111827;
        border-bottom: 2px solid #1f2937;
    }

    .topbar h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 700;
    }

    .player-info {
        text-align: right;
    }

    .player-info div {
        font-size: 15px;
        margin-bottom: 4px;
    }

    .balance {
        font-size: 18px;
        font-weight: bold;
        color: #22c55e;
    }

    .table {
        max-width: 1200px;
        margin: 40px auto;
        background: radial-gradient(circle at center, #1e293b, #0f172a);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .dealer-area, .player-area {
        margin-bottom: 40px;
    }

    .section-title {
        font-size: 22px;
        margin-bottom: 10px;
        font-weight: 600;
    }

    .cards {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    .card {
        width: 90px;
        height: 130px;
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 0 10px rgba(0,0,0,0.4);
        transition: transform .2s ease;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .controls {
        display: flex;
        gap: 12px;
        margin-top: 20px;
    }

    button {
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background .2s ease;
    }

    .btn-primary {
        background: #22c55e;
        color: #000;
    }

    .btn-primary:hover {
        background: #16a34a;
    }

    .btn-secondary {
        background: #374151;
        color: #fff;
    }

    .btn-secondary:hover {
        background: #4b5563;
    }

    .btn-danger {
        background: #dc2626;
        color: #fff;
    }

    .btn-danger:hover {
        background: #b91c1c;
    }

    .status {
        margin-top: 20px;
        font-size: 16px;
        min-height: 24px;
        color: #cbd5e1;
    }

    .seat-row {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
    }

    .seat {
        flex: 1;
        padding: 12px;
        background: #1f2937;
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border .2s ease;
    }

    .seat:hover {
        border-color: #22c55e;
    }

    .seat.occupied {
        background: #374151;
        cursor: default;
    }

    .seat.you {
        border-color: #22c55e;
        box-shadow: 0 0 10px #22c55e;
    }

</style>
</head>

<body>

<div class="topbar">
    <h1>Lucky 13 – Blackjack</h1>
    <div class="player-info">
        <div>Player: <span id="usernameDisplay">...</span></div>
        <div class="balance">Balance: <span id="balanceDisplay">0</span></div>
    </div>
</div>

<div class="table">

    <!-- Seats -->
    <div class="seat-row" id="seatList"></div>

    <!-- Dealer -->
    <div class="dealer-area">
        <div class="section-title">Dealer</div>
        <div>Total: <span id="dealerTotal">0</span></div>
        <div class="cards" id="dealerCards"></div>
    </div>

    <!-- Player -->
    <div class="player-area">
        <div class="section-title">Your Hand</div>
        <div>Total: <span id="playerTotal">0</span></div>
        <div class="cards" id="playerCards"></div>

        <div class="controls">
            <input type="number" id="betAmount" min="1" value="10" style="padding:10px;border-radius:8px;border:none;width:120px;">
            <button class="btn-primary" onclick="placeBet()">Bet</button>
            <button class="btn-secondary" onclick="hit()">Hit</button>
            <button class="btn-secondary" onclick="stand()">Stand</button>
            <button class="btn-secondary" onclick="doubleDown()">Double</button>
            <button class="btn-danger" onclick="leaveSeat()">Leave</button>
        </div>

        <div class="status" id="statusText"></div>
    </div>

</div>

<script src="https://gambling-site-production.up.railway.app/socket.io/socket.io.js"></script>
<script>
const API = "https://gambling-site-production.up.railway.app";
const token = localStorage.getItem("token");
if (!token) window.location.href = "../login.html";

const socket = io(API, { auth: { token } });

function cardUrl(code) {
    return `https://deckofcardsapi.com/static/img/${code}.png`;
}

function renderCards(id, cards) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    cards.forEach(c => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<img src="${cardUrl(c)}">`;
        el.appendChild(div);
    });
}

async function loadPlayerInfo() {
    const u = await fetch(`${API}/api/me`, { headers: { Authorization: token } });
    const ud = await u.json();
    document.getElementById("usernameDisplay").textContent = ud.username;

    const b = await fetch(`${API}/api/balance`, { headers: { Authorization: token } });
    const bd = await b.json();
    document.getElementById("balanceDisplay").textContent = bd.balance;
}

socket.on("tableState", state => {
    renderCards("dealerCards", state.dealer.cards);
    document.getElementById("dealerTotal").textContent = state.dealer.total;

    const me = state.players.find(p => p.username === document.getElementById("usernameDisplay").textContent);
    if (me) {
        renderCards("playerCards", me.hand.cards);
        document.getElementById("playerTotal").textContent = me.hand.total;
        document.getElementById("balanceDisplay").textContent = me.balance;
    }

    renderSeats(state.seats);
});

function renderSeats(seats) {
    const seatList = document.getElementById("seatList");
    seatList.innerHTML = "";
    for (let i = 0; i < 5; i++) {
        const seat = seats.find(s => s.seatIndex === i);
        const div = document.createElement("div");
        div.className = "seat";
        if (seat) {
            div.classList.add("occupied");
            if (seat.username === document.getElementById("usernameDisplay").textContent) {
                div.classList.add("you");
            }
            div.innerHTML = `<strong>${seat.username}</strong>`;
        } else {
            div.innerHTML = `<strong>Seat ${i+1}</strong>`;
            div.onclick = () => socket.emit("joinSeat", { seatIndex: i });
        }
        seatList.appendChild(div);
    }
}

function placeBet() {
    socket.emit("placeBet", { amount: parseInt(document.getElementById("betAmount").value) });
}

function hit() { socket.emit("hit"); }
function stand() { socket.emit("stand"); }
function doubleDown() { socket.emit("double"); }
function leaveSeat() { socket.emit("leaveSeat"); }

socket.on("message", msg => {
    document.getElementById("statusText").textContent = msg;
});

loadPlayerInfo();
</script>

</body>
</html>
