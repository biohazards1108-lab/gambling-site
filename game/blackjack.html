<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 – Blackjack</title>

<style>
body {
    margin: 0;
    background: #050810;
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 30px;
    background: #111827;
    border-bottom: 2px solid #1f2937;
}
.topbar h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    color: #facc15;
}
.player-info {
    text-align: right;
    font-size: 16px;
}
.balance {
    font-size: 20px;
    font-weight: bold;
    color: #22c55e;
}

/* TABLE WRAPPER */
.table-wrapper {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

/* VEGAS TABLE */
.table {
    width: 1200px;
    height: 650px;
    background: radial-gradient(circle at center, #0f4d2c, #06341f);
    border-radius: 50% / 30%;
    border: 10px solid #b8860b;
    box-shadow: 0 0 80px rgba(0,0,0,0.8);
    position: relative;
    padding-top: 40px;
}

/* TABLE MARKINGS */
.table::before {
    content: "BLACKJACK PAYS 3 TO 2";
    position: absolute;
    top: 120px;
    width: 100%;
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    color: gold;
    opacity: 0.9;
}
.table::after {
    content: "Dealer must draw to 16 and stand on all 17s";
    position: absolute;
    top: 160px;
    width: 100%;
    text-align: center;
    font-size: 18px;
    color: #fef3c7;
    opacity: 0.8;
}

/* SEATS */
.seat-row {
    position: absolute;
    bottom: 160px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
}
.seat {
    padding: 12px;
    background: rgba(15,23,42,0.9);
    border-radius: 12px;
    width: 130px;
    text-align: center;
    cursor: pointer;
    border: 3px solid transparent;
    transition: 0.2s;
    font-size: 14px;
}
.seat:hover {
    border-color: #facc15;
}
.seat.occupied {
    background: #374151;
    cursor: default;
}
.seat.you {
    border-color: #22c55e;
    box-shadow: 0 0 12px #22c55e;
}

/* DEALER AREA */
.dealer-area {
    text-align: center;
    margin-bottom: 20px;
}
.section-title {
    font-size: 24px;
    font-weight: 600;
    color: #facc15;
}
.dealer-cards {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 12px;
}

/* PLAYER AREA */
.player-area {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
}
.player-cards {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 12px;
}

/* CARD */
.card {
    width: 100px;
    height: 145px;
    border-radius: 10px;
    background: #fff;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    overflow: hidden;
    animation: deal 0.35s ease-out;
}
@keyframes deal {
    from { transform: translateY(25px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CONTROLS */
.controls {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}
button {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}
.btn-primary { background: #22c55e; color: #000; }
.btn-secondary { background: #374151; color: #fff; }
.btn-danger { background: #dc2626; color: #fff; }

/* CHIP BUTTONS */
.chips {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
}
.chip {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid #facc15;
    background: radial-gradient(circle at center, #f97316, #b45309);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.6);
}
.chip:hover {
    transform: translateY(-2px);
}

/* STATUS */
.status {
    margin-top: 15px;
    font-size: 18px;
    min-height: 24px;
    color: #e5e7eb;
}
</style>
</head>

<body>

<div class="topbar">
    <h1>Lucky 13 – Blackjack</h1>
    <div class="player-info">
        <div>Player: <span id="usernameDisplay">...</span></div>
        <div class="balance">Balance: <span id="balanceDisplay">0</span></div>
    </div>
</div>

<div class="table-wrapper">
    <div class="table">

        <div class="seat-row" id="seatList"></div>

        <div class="dealer-area">
            <div class="section-title">Dealer</div>
            <div>Total: <span id="dealerTotal">0</span></div>
            <div class="dealer-cards" id="dealerCards"></div>
        </div>

        <div class="player-area">
            <div class="section-title">Your Hand</div>
            <div>Total: <span id="playerTotal">0</span></div>
            <div class="player-cards" id="playerCards"></div>

            <div class="controls">
                <input type="number" id="betAmount" min="1" value="10" class="bet-input">
                <button class="btn-primary" onclick="placeBet()">Bet</button>
                <button class="btn-secondary" onclick="hit()">Hit</button>
                <button class="btn-secondary" onclick="stand()">Stand</button>
                <button class="btn-secondary" onclick="doubleDown()">Double</button>
                <button class="btn-danger" onclick="leaveSeat()">Leave Seat</button>
            </div>

            <div class="chips">
                <div class="chip" onclick="addChip(10)">10</div>
                <div class="chip" onclick="addChip(25)">25</div>
                <div class="chip" onclick="addChip(50)">50</div>
                <div class="chip" onclick="addChip(100)">100</div>
                <div class="chip" onclick="addChip(500)">500</div>
            </div>

            <div class="status" id="statusText"></div>
        </div>

    </div>
</div>

<script src="https://gambling-site-production.up.railway.app/socket.io/socket.io.js"></script>
<script>
const API = "https://gambling-site-production.up.railway.app";
const token = localStorage.getItem("token");
if (!token) window.location.href = "../login.html";

const socket = io(API, { auth: { token } });

function cardUrl(code) {
    return `https://deckofcardsapi.com/static/img/${code}.png`;
}

function renderCards(id, cards) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    cards.forEach(c => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<img src="${cardUrl(c)}">`;
        el.appendChild(div);
    });
}

async function loadPlayerInfo() {
    let username = "Player";
    try {
        const u = await fetch(`${API}/api/me`, { headers: { Authorization: token } });
        const ud = await u.json();
        if (ud.username) username = ud.username;
    } catch {}

    document.getElementById("usernameDisplay").textContent = username;

    try {
        const b = await fetch(`${API}/api/balance`, { headers: { Authorization: token } });
        const bd = await b.json();
        document.getElementById("balanceDisplay").textContent = bd.balance;
    } catch (e) {
        console.error("Balance fetch error", e);
    }
}

socket.on("tableState", state => {
    renderCards("dealerCards", state.dealer.cards);
    document.getElementById("dealerTotal").textContent = state.dealer.total;

    const username = document.getElementById("usernameDisplay").textContent;
    const me = state.players.find(p => p.username === username);

    if (me) {
        renderCards("playerCards", me.hand.cards);
        document.getElementById("playerTotal").textContent = me.hand.total;
        document.getElementById("balanceDisplay").textContent = me.balance;
    }

    renderSeats(state.seats, username);
});

function renderSeats(seats, username) {
    const seatList = document.getElementById("seatList");
    seatList.innerHTML = "";

    for (let i = 0; i < 5; i++) {
        const seat = seats.find(s => s.seatIndex === i);
        const div = document.createElement("div");
        div.className = "seat";

        if (seat) {
            div.classList.add("occupied");
            if (seat.username === username) div.classList.add("you");
            div.innerHTML = `<strong>${seat.username}</strong>`;
        } else {
            div.innerHTML = `<strong>Seat ${i+1}</strong>`;
            div.onclick = () => socket.emit("joinSeat", { seatIndex: i });
        }

        seatList.appendChild(div);
    }
}

function addChip(amount) {
    const input = document.getElementById("betAmount");
    const current = parseInt(input.value) || 0;
    input.value = current + amount;
}

function placeBet() {
    const amount = parseInt(document.getElementById("betAmount").value);
    if (!amount || amount <= 0) {
        document.getElementById("statusText").textContent = "Enter a valid bet.";
        return;
    }
    socket.emit("placeBet", { amount });
}

function hit() { socket.emit("hit"); }
function stand() { socket.emit("stand"); }
function doubleDown() { socket.emit("double"); }
function leaveSeat() { socket.emit("leaveSeat"); }

socket.on("message", msg => {
    document.getElementById("statusText").textContent = msg;
});
socket.on("errorMessage", msg => {
    document.getElementById("statusText").textContent = msg;
});

loadPlayerInfo();
</script>

</body>
</html>
