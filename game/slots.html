<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 – Slots</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        color: #f2d57c;
        background: radial-gradient(circle at 50% 20%, #5a0000 0%, #1a0000 70%);
        text-align: center;
        overflow-x: hidden;
    }

    h1 {
        margin-top: 25px;
        font-size: 42px;
        text-shadow: 0 0 25px #f2d57c;
    }

    #top-bar {
        margin-top: 10px;
        display: flex;
        justify-content: center;
        gap: 15px;
        align-items: center;
        background: rgba(0,0,0,0.4);
        padding: 10px 20px;
        border-radius: 12px;
        border: 1px solid #f2d57c;
    }

    #balance {
        font-size: 20px;
    }

    #refill-btn {
        padding: 8px 18px;
        font-size: 16px;
        background: #f2d57c;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #000;
        transition: 0.3s;
    }

    #refill-btn:hover {
        background: #c9b15f;
    }

    .slot-container {
        margin: 40px auto;
        width: 90%;
        max-width: 700px;
        display: flex;
        justify-content: space-between;
        gap: 20px;
    }

    .reel {
        width: 30%;
        height: 180px;
        background: rgba(15,15,15,0.95);
        border: 2px solid #f2d57c;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 25px rgba(242,213,124,0.4);
        position: relative;
    }

    .reel-track {
        display: flex;
        flex-direction: column;
        transition: transform 1.2s cubic-bezier(.17,.67,.83,.67);
    }

    .symbol {
        width: 100%;
        height: 60px;
        object-fit: contain;
    }

    .spin-btn {
        margin-top: 25px;
        padding: 15px 40px;
        font-size: 22px;
        background: #f2d57c;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        color: #000;
    }

    .spin-btn:hover {
        background: #c9b15f;
    }

    #result {
        margin-top: 20px;
        font-size: 24px;
        text-shadow: 0 0 10px #f2d57c;
        min-height: 30px;
    }

    .coin {
        position: fixed;
        top: -50px;
        width: 32px;
        height: 32px;
        background-image: url("../assets/images/coin.png");
        background-size: cover;
        animation: fall linear infinite;
        opacity: 0.7;
        z-index: 1;
    }

    @keyframes fall {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(110vh) rotate(360deg); }
    }
</style>
</head>
<body>

<h1>Lucky 13 Slots</h1>

<div id="top-bar">
    <div id="balance">Balance: loading...</div>
    <button id="refill-btn" onclick="refill()">Refill (max 1000)</button>
</div>

<div class="slot-container">
    <div class="reel" id="reel1"></div>
    <div class="reel" id="reel2"></div>
    <div class="reel" id="reel3"></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
const API_BASE = "https://gambling-site-production.up.railway.app";
const token = localStorage.getItem("token");

// Falling coins
function spawnCoin() {
    const coin = document.createElement("div");
    coin.classList.add("coin");
    coin.style.left = Math.random() * window.innerWidth + "px";
    coin.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(coin);
    setTimeout(() => coin.remove(), 7000);
}
setInterval(spawnCoin, 350);

// Symbols (replace with real PNGs later)
const symbols = [
    "/gambling-site/assets/images/slots/slot-cherry.png",
    "/gambling-site/assets/images/slots/slot-bar.png",
    "/gambling-site/assets/images/slots/slot-seven.png",
    "/gambling-site/assets/images/slots/slot-diamond.png",
    "/gambling-site/assets/images/slots/slot-bell.png"
];

// Load balance immediately
async function loadBalance() {
    const el = document.getElementById("balance");
    if (!token) {
        el.textContent = "Balance: login required";
        return;
    }
    try {
        const res = await fetch(`${API_BASE}/api/balance`, {
            headers: { "Authorization": token }
        });
        const data = await res.json();
        el.textContent = "Balance: " + (data.balance ?? "error");
    } catch {
        el.textContent = "Balance: error";
    }
}
document.addEventListener("DOMContentLoaded", loadBalance);

// Refill (max 1000)
async function refill() {
    if (!token) {
        alert("Login required");
        return;
    }
    try {
        const res = await fetch(`${API_BASE}/api/refill`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": token
            }
        });
        const data = await res.json();
        document.getElementById("balance").textContent = "Balance: " + data.balance;
        document.getElementById("result").textContent = data.message || "";
    } catch {
        document.getElementById("result").textContent = "Refill error";
    }
}

// Build reel track
function buildReelTrack() {
    const track = document.createElement("div");
    track.classList.add("reel-track");
    for (let i = 0; i < 10; i++) {
        const img = document.createElement("img");
        img.src = symbols[Math.floor(Math.random() * symbols.length)];
        img.classList.add("symbol");
        track.appendChild(img);
    }
    return track;
}

// Spin logic
function spin() {
    if (!token) {
        alert("Login required");
        return;
    }

    document.getElementById("result").textContent = "";

    const reelIds = ["reel1", "reel2", "reel3"];
    reelIds.forEach(id => {
        const reel = document.getElementById(id);
        const track = buildReelTrack();
        reel.innerHTML = "";
        reel.appendChild(track);
        track.style.transform = "translateY(0)";
        setTimeout(() => {
            track.style.transform = "translateY(-600px)";
        }, 50);
        setTimeout(() => {
            const finalSymbol = symbols[Math.floor(Math.random() * symbols.length)];
            reel.innerHTML = `<img src="${finalSymbol}" class="symbol">`;
        }, 1200);
    });

    fetch(`${API_BASE}/api/bet`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({ amount: 50 })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("balance").textContent = "Balance: " + data.balance;
        document.getElementById("result").textContent =
            data.result === "win" ? `WIN! +${data.payout}` : "LOSE!";
    })
    .catch(() => {
        document.getElementById("result").textContent = "Server error";
    });
}
</script>

</body>
</html>
