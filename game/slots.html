<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 – Slots</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #1a1a1a 0%, #000 70%);
        font-family: Arial, sans-serif;
        color: #f2d57c;
        overflow-x: hidden;
        text-align: center;
    }

    h1 {
        margin-top: 25px;
        font-size: 42px;
        text-shadow: 0 0 20px #f2d57c;
    }

    #balance {
        margin-top: 10px;
        font-size: 20px;
        background: rgba(20,20,20,0.9);
        display: inline-block;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid #f2d57c;
    }

    .slot-container {
        margin: 40px auto;
        width: 90%;
        max-width: 700px;
        display: flex;
        justify-content: space-between;
        gap: 20px;
    }

    .reel {
        width: 30%;
        height: 180px;
        background: rgba(15,15,15,0.95);
        border: 2px solid #f2d57c;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 20px rgba(242,213,124,0.4);
    }

    .symbol {
        width: 100%;
        height: 100%;
        object-fit: contain;
        transition: transform 0.3s ease;
    }

    .spin-btn {
        margin-top: 25px;
        padding: 15px 40px;
        font-size: 22px;
        background: #f2d57c;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        color: #000;
    }

    .spin-btn:hover {
        background: #c9b15f;
    }

    #result {
        margin-top: 20px;
        font-size: 24px;
        text-shadow: 0 0 10px #f2d57c;
    }

    /* Falling coins */
    .coin {
        position: fixed;
        top: -50px;
        width: 32px;
        height: 32px;
        background-image: url("../assets/images/coin.png");
        background-size: cover;
        animation: fall linear infinite;
        opacity: 0.7;
        z-index: 1;
    }

    @keyframes fall {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(110vh) rotate(360deg); }
    }
</style>
</head>
<body>

<h1>Lucky 13 Slots</h1>
<div id="balance">Balance: loading...</div>

<div class="slot-container">
    <div class="reel" id="reel1"></div>
    <div class="reel" id="reel2"></div>
    <div class="reel" id="reel3"></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
// Falling coins animation
function spawnCoin() {
    const coin = document.createElement("div");
    coin.classList.add("coin");
    coin.style.left = Math.random() * window.innerWidth + "px";
    coin.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(coin);
    setTimeout(() => coin.remove(), 7000);
}
setInterval(spawnCoin, 350);

// Placeholder symbols (replace with your PNGs later)
const symbols = [
    "https://via.placeholder.com/200x200?text=Cherry",
    "https://via.placeholder.com/200x200?text=Bar",
    "https://via.placeholder.com/200x200?text=Seven",
    "https://via.placeholder.com/200x200?text=Diamond",
    "https://via.placeholder.com/200x200?text=Bell"
];

// Load balance
(async () => {
    const token = localStorage.getItem("token");
    const el = document.getElementById("balance");

    if (!token) {
        el.textContent = "Balance: login required";
        return;
    }

    try {
        const res = await fetch("https://gambling-site-production.up.railway.app/api/balance", {
            headers: { "Authorization": token }
        });
        const data = await res.json();
        el.textContent = "Balance: " + data.balance;
    } catch {
        el.textContent = "Balance: error";
    }
})();

// Spin logic
function spin() {
    const token = localStorage.getItem("token");
    if (!token) {
        alert("Login required");
        return;
    }

    // Spin animation
    const reels = ["reel1", "reel2", "reel3"];
    reels.forEach(id => {
        const reel = document.getElementById(id);
        reel.innerHTML = `<img src="${symbols[Math.floor(Math.random()*symbols.length)]}" class="symbol" style="transform: rotate(${Math.random()*360}deg)">`;
    });

    // Backend bet
    fetch("https://gambling-site-production.up.railway.app/api/bet", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({ amount: 50 }) // fixed bet for now
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("balance").textContent = "Balance: " + data.balance;

        if (data.result === "win") {
            document.getElementById("result").textContent = "WIN! +" + data.payout;
        } else {
            document.getElementById("result").textContent = "LOSE!";
        }
    })
    .catch(() => {
        document.getElementById("result").textContent = "Server error";
    });
}
</script>

</body>
</html>
