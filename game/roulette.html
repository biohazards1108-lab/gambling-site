<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lucky 13 Casino – Roulette</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at top, #111111 0%, #050505 50%, #000000 100%);
    color: #f9f3d7;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: #050608;
    border-bottom: 1px solid #262626;
}

.top-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.top-left img {
    height: 36px;
    border-radius: 6px;
    border: 1px solid #f5c451;
}

.top-left h1 {
    font-size: 1.2rem;
    color: #f5c451;
}

.top-right {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.85rem;
}

.wallet-pill {
    padding: 6px 12px;
    border-radius: 999px;
    background: #101010;
    border: 1px solid #3a3a3a;
}

.wallet-pill span.value {
    color: #f5c451;
}

.back-link {
    color: #e0d7ff;
    text-decoration: none;
    font-weight: 600;
}

/* TABLE AREA */
.table-wrapper {
    max-width: 900px;
    margin: 24px auto;
    padding: 0 24px 40px;
    text-align: center;
}

.table-title {
    font-size: 1.4rem;
    margin-bottom: 8px;
}

.table-subtitle {
    font-size: 0.95rem;
    color: #d0c7ff;
    margin-bottom: 16px;
}

/* Roulette Wheel */
.wheel-container {
    margin: 20px auto;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 6px solid #f5c451;
    background: conic-gradient(
        #d00 0deg 10deg,
        #000 10deg 20deg,
        #d00 20deg 30deg,
        #000 30deg 40deg,
        #d00 40deg 50deg,
        #000 50deg 60deg,
        #d00 60deg 70deg,
        #000 70deg 80deg,
        #d00 80deg 90deg,
        #000 90deg 100deg,
        #d00 100deg 110deg,
        #000 110deg 120deg,
        #d00 120deg 130deg,
        #000 130deg 140deg,
        #d00 140deg 150deg,
        #000 150deg 160deg,
        #d00 160deg 170deg,
        #000 170deg 180deg,
        #d00 180deg 190deg,
        #000 190deg 200deg,
        #d00 200deg 210deg,
        #000 210deg 220deg,
        #d00 220deg 230deg,
        #000 230deg 240deg,
        #d00 240deg 250deg,
        #000 250deg 260deg,
        #d00 260deg 270deg,
        #000 270deg 280deg,
        #d00 280deg 290deg,
        #000 290deg 300deg,
        #d00 300deg 310deg,
        #000 310deg 320deg,
        #d00 320deg 330deg,
        #000 330deg 340deg,
        #d00 340deg 350deg,
        #000 350deg 360deg
    );
    position: relative;
    overflow: hidden;
}

.ball {
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    top: 140px;
    left: 140px;
    transition: transform 3s ease-out;
}

/* Controls */
.controls {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.btn {
    padding: 8px 18px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
}

.btn-primary {
    background: linear-gradient(135deg, #f5c451, #ff6bcb);
    color: #050505;
}

.btn-secondary {
    background: transparent;
    border: 1px solid #f5c451;
    color: #f5c451;
}

.btn-secondary:hover {
    background: #f5c451;
    color: #050505;
}

/* Status */
.status {
    margin-top: 16px;
    font-size: 1rem;
    color: #f9f3d7;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="top-left">
        <img src="assets/images/logo.png" alt="Lucky 13 Logo" />
        <h1>Lucky 13 Roulette</h1>
    </div>
    <div class="top-right">
        <a href="index.html" class="back-link">← Back to Lobby</a>
        <div class="wallet-pill">Balance: <span id="balance" class="value">$0</span></div>
        <div class="wallet-pill">Bet: <span id="bet" class="value">$50</span></div>
    </div>
</div>

<div class="table-wrapper">
    <div class="table-title">Roulette – Spin the Wheel</div>
    <div class="table-subtitle">Bet on number, color, or even/odd.</div>

    <div class="wheel-container">
        <div id="ball" class="ball"></div>
    </div>

    <div class="controls">
        <button class="btn btn-secondary" onclick="setBet('red')">Red</button>
        <button class="btn btn-secondary" onclick="setBet('black')">Black</button>
        <button class="btn btn-secondary" onclick="setBet('even')">Even</button>
        <button class="btn btn-secondary" onclick="setBet('odd')">Odd</button>
        <button class="btn btn-primary" onclick="spin()">SPIN ($50)</button>
    </div>

    <div id="status" class="status">Choose a bet, then spin.</div>
</div>

<script>
/* ---------------- BACKEND CONNECTION ---------------- */

const API = "https://gambling-site-production.up.railway.app";

async function fetchBalance() {
    const res = await fetch(`${API}/balance`);
    const data = await res.json();
    balance = data.balance;
    document.getElementById("balance").textContent = "$" + balance;
}

async function updateBalance(delta) {
    const res = await fetch(`${API}/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ delta })
    });
    const data = await res.json();
    balance = data.balance;
    document.getElementById("balance").textContent = "$" + balance;
}

/* ---------------- GAME LOGIC ---------------- */

let balance = 0;
const betAmount = 50;
let currentBet = null;

document.getElementById("bet").textContent = "$" + betAmount;

function setBet(type) {
    currentBet = type;
    document.getElementById("status").textContent = `Bet set: ${type.toUpperCase()}. Spin the wheel.`;
}

function spin() {
    const status = document.getElementById("status");

    if (!currentBet) {
        status.textContent = "Choose a bet first.";
        return;
    }

    if (balance < betAmount) {
        status.textContent = "Not enough balance.";
        return;
    }

    updateBalance(-betAmount);

    const ball = document.getElementById("ball");
    const angle = Math.floor(Math.random() * 360);
    ball.style.transform = `rotate(${angle}deg) translate(120px)`;

    setTimeout(() => evaluate(angle), 3000);
}

function evaluate(angle) {
    const status = document.getElementById("status");

    const number = Math.floor(angle / 10);
    const isRed = number % 2 === 0;
    const isEven = number % 2 === 0;

    let win = 0;

    if (currentBet === "red" && isRed) win = betAmount * 2;
    if (currentBet === "black" && !isRed) win = betAmount * 2;
    if (currentBet === "even" && isEven) win = betAmount * 2;
    if (currentBet === "odd" && !isEven) win = betAmount * 2;

    updateBalance(win);

    status.textContent = `Result: ${number} (${isRed ? "Red" : "Black"}). Win: $${win}.`;
}

fetchBalance();
</script>

</body>
</html>
