<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 Casino – Game Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: 'Arial', sans-serif;
        color: #f2d57c;
        overflow-x: hidden;
    }

    /* Gold neon glow */
    .glow {
        text-shadow: 0 0 10px #f2d57c, 0 0 20px #f2d57c, 0 0 30px #f2d57c;
    }

    /* Header */
    .header {
        text-align: center;
        padding: 30px 0;
        font-size: 42px;
        font-weight: bold;
        letter-spacing: 4px;
        color: #f2d57c;
        text-shadow: 0 0 15px #f2d57c;
    }

    /* Game grid */
    .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
        padding: 20px;
        max-width: 1200px;
        margin: auto;
    }

    .game-tile {
        background: rgba(20, 20, 20, 0.9);
        border: 2px solid #f2d57c;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 0 15px #f2d57c;
    }

    .game-tile:hover {
        transform: scale(1.08);
        box-shadow: 0 0 25px #f2d57c;
    }

    .game-tile img {
        width: 120px;
        height: 120px;
        margin-bottom: 15px;
    }

    .game-tile h3 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 2px;
    }

    /* Falling coins */
    .coin {
        position: fixed;
        top: -50px;
        width: 40px;
        height: 40px;
        background-image: url("../assets/image/png/coin.png");
        background-size: cover;
        animation: fall linear infinite;
        opacity: 0.8;
        z-index: 1;
    }

    @keyframes fall {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(110vh) rotate(360deg); }
    }
</style>
</head>
<body>

<div class="header glow">Lucky 13 Casino</div>

<div class="game-grid">

    <div class="game-tile" onclick="location.href='blackjack.html'">
        <img src="../assets/ui/blackjack.png">
        <h3>Blackjack</h3>
    </div>

    <div class="game-tile" onclick="location.href='slots.html'">
        <img src="../assets/ui/slots.png">
        <h3>Slots</h3>
    </div>

    <div class="game-tile" onclick="location.href='roulette.html'">
        <img src="../assets/ui/roulette.png">
        <h3>Roulette</h3>
    </div>

    <div class="game-tile" onclick="location.href='plinko.html'">
        <img src="../assets/ui/plinko.png">
        <h3>Plinko</h3>
    </div>

    <div class="game-tile" onclick="location.href='poker.html'">
        <img src="../assets/ui/poker.png">
        <h3>Poker</h3>
    </div>

    <div class="game-tile" onclick="location.href='war.html'">
        <img src="../assets/ui/war.png">
        <h3>War</h3>
    </div>

</div>

<script>
// Falling coins generator
function spawnCoin() {
    const coin = document.createElement("div");
    coin.classList.add("coin");
    coin.style.left = Math.random() * window.innerWidth + "px";
    coin.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(coin);

    setTimeout(() => coin.remove(), 6000);
}

setInterval(spawnCoin, 300);
</script>

</body>
</html>
