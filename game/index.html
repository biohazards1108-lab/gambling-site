<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 Casino – Game Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: 'Arial', sans-serif;
        color: #f2d57c;
        overflow-x: hidden;
    }

    /* Gold neon glow */
    .glow {
        text-shadow: 0 0 10px #f2d57c, 0 0 20px #f2d57c, 0 0 30px #f2d57c;
    }

    /* Falling coins */
    .coin {
        position: fixed;
        top: -50px;
        width: 40px;
        height: 40px;
        background-image: url("../assets/images/coin.png");
        background-size: cover;
        animation: fall linear infinite;
        opacity: 0.8;
        z-index: 1;
    }

    @keyframes fall {
        0% { transform: translateY(-100px) rotate(0deg); }
        100% { transform: translateY(110vh) rotate(360deg); }
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 260px;
        height: 100vh;
        background: rgba(10, 10, 10, 0.95);
        border-right: 2px solid #f2d57c;
        padding: 20px;
        z-index: 2;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 26px;
        color: #f2d57c;
        letter-spacing: 2px;
    }

    .game-link {
        display: block;
        padding: 12px;
        margin: 10px 0;
        background: #111;
        border: 1px solid #333;
        border-radius: 6px;
        text-decoration: none;
        color: #f2d57c;
        text-align: center;
        transition: 0.3s;
    }

    .game-link:hover {
        background: #f2d57c;
        color: #000;
        border-color: #f2d57c;
        transform: scale(1.05);
    }

    /* Main content */
    .main {
        margin-left: 280px;
        padding: 40px;
        z-index: 2;
        position: relative;
    }

    .main h1 {
        font-size: 42px;
        margin-bottom: 20px;
        color: #f2d57c;
    }

    .balance-box {
        background: rgba(242, 213, 124, 0.15);
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        font-size: 20px;
        border: 2px solid #f2d57c;
        margin-bottom: 20px;
    }

    .logout-btn {
        padding: 12px 20px;
        background: #f2d57c;
        border: none;
        border-radius: 6px;
        color: #000;
        cursor: pointer;
        font-size: 18px;
        transition: 0.3s;
    }

    .logout-btn:hover {
        background: #c9b15f;
    }
</style>
</head>
<body>

<!-- Falling coins -->
<script>
for (let i = 0; i < 25; i++) {
    const coin = document.createElement("div");
    coin.classList.add("coin");
    coin.style.left = Math.random() * 100 + "vw";
    coin.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(coin);
}
</script>

<!-- Sidebar -->
<div class="sidebar">
    <h2 class="glow">🎰 Lucky 13</h2>

    <a class="game-link" href="blackjack.html">Blackjack</a>
    <a class="game-link" href="craps.html">Craps</a>
    <a class="game-link" href="plinko.html">Plinko</a>
    <a class="game-link" href="poker.html">Poker</a>
    <a class="game-link" href="roulette.html">Roulette</a>
    <a class="game-link" href="slots.html">Slots</a>
    <a class="game-link" href="threecard.html">Three Card Poker</a>
    <a class="game-link" href="war.html">War</a>
</div>

<!-- Main content -->
<div class="main">
    <h1 class="glow">Welcome to Lucky 13 Casino</h1>

    <div class="balance-box" id="balanceBox">
        Loading balance...
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script>
const API = "gambling-site-production.up.railway.app"; // IMPORTANT — replace this

// ---------------------------------------------
// AUTH CHECK
// ---------------------------------------------
const token = localStorage.getItem("token");
if (!token) {
    window.location.href = "../login.html";
}

// ---------------------------------------------
// LOAD BALANCE
// ---------------------------------------------
async function loadBalance() {
    try {
        const res = await fetch(API + "/balance", {
            method: "GET",
            headers: { "Authorization": token }
        });

        const data = await res.json();

        if (data.error) {
            document.getElementById("balanceBox").innerText = "Error loading balance.";
            return;
        }

        document.getElementById("balanceBox").innerText = "Balance: $" + data.balance;

    } catch (err) {
        document.getElementById("balanceBox").innerText = "Error loading balance.";
    }
}

loadBalance();

// ---------------------------------------------
// LOGOUT
// ---------------------------------------------
function logout() {
    localStorage.removeItem("token");
    window.location.href = "../login.html";
}
</script>

</body>
</html>
