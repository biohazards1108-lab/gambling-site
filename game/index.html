<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lucky 13 Casino – Game Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #d4af37;
            --text: #fff;
            --muted: #bbb;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 70%);
            font-family: system-ui, sans-serif;
            color: var(--text);
            display: flex;
            height: 100vh;
        }

        /* Left: Logo + Rules */
        .left {
            flex: 2;
            padding: 40px;
            text-align: center;
        }

        .logo img {
            width: 180px;
            margin-bottom: 20px;
        }

        .rules-box {
            background: #111;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            max-width: 500px;
            margin: 0 auto;
        }

        .rules-box h2 {
            color: var(--accent);
            margin-bottom: 15px;
        }

        /* Right: Game List */
        .right {
            flex: 1;
            background: #111;
            padding: 40px;
            border-left: 2px solid var(--accent);
        }

        .right h2 {
            color: var(--accent);
            margin-bottom: 20px;
        }

        .game-link {
            display: block;
            padding: 12px;
            margin-bottom: 12px;
            background: #000;
            border: 1px solid var(--accent);
            border-radius: 6px;
            text-decoration: none;
            color: var(--text);
            font-size: 1rem;
            transition: 0.25s;
        }

        .game-link:hover {
            background: var(--accent);
            color: #000;
        }

        /* Balance + Logout */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .logout {
            margin-left: 20px;
            color: var(--muted);
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        Balance: <span id="balance">Loading...</span>
        <span class="logout" onclick="logout()">Logout</span>
    </div>

    <div class="left">
        <div class="logo">
            <img src="../assets/images/casino-13.png" alt="Lucky 13 Logo">
        </div>

        <div class="rules-box">
            <h2>Game Rules</h2>
            <p>Select a game from the right to view its rules and begin playing.</p>
        </div>
    </div>

    <div class="right">
        <h2>Games</h2>

        <a class="game-link" href="blackjack.html">Blackjack</a>
        <a class="game-link" href="slots.html">Slots</a>
        <a class="game-link" href="roulette.html">Roulette</a>
        <a class="game-link" href="plinko.html">Plinko</a>
        <a class="game-link" href="poker.html">Poker</a>
        <a class="game-link" href="war.html">War</a>
    </div>

    <script>
        const API = "https://gambling-site-production.up.railway.app";

        async function loadBalance() {
            const token = localStorage.getItem("userToken");
            if (!token) return window.location.href = "../login.html";

            const res = await fetch(`${API}/api/balance`, {
                headers: { "Authorization": token }
            });

            const data = await res.json();
            document.getElementById("balance").innerText = data.balance ?? "error";
        }

        function logout() {
            localStorage.removeItem("userToken");
            window.location.href = "../login.html";
        }

        loadBalance();
    </script>

</body>
</html>
