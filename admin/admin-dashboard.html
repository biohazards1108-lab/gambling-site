<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 – Admin Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at 20% 0%, #0b3b2e 0%, #02110c 50%, #000 100%);
        color: #f2d57c;
        display: flex;
        height: 100vh;
    }

    .sidebar {
        width: 260px;
        background: rgba(0,0,0,0.7);
        border-right: 1px solid #f2d57c;
        padding: 20px;
        box-sizing: border-box;
    }

    .sidebar h2 {
        margin-top: 0;
        font-size: 22px;
        text-shadow: 0 0 10px #f2d57c;
    }

    .sidebar .stat {
        margin-top: 15px;
        font-size: 14px;
    }

    .main {
        flex: 1;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .top-row {
        display: flex;
        gap: 20px;
        flex: 0 0 auto;
    }

    .panel {
        background: rgba(0,0,0,0.6);
        border-radius: 12px;
        border: 1px solid #f2d57c;
        padding: 15px;
        flex: 1;
        box-sizing: border-box;
        overflow: hidden;
    }

    .panel h3 {
        margin-top: 0;
        font-size: 18px;
        text-shadow: 0 0 8px #f2d57c;
    }

    #users-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }

    #users-table th,
    #users-table td {
        padding: 6px 8px;
        border-bottom: 1px solid rgba(242,213,124,0.2);
        text-align: left;
    }

    #users-table th {
        background: rgba(242,213,124,0.1);
    }

    .game-row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid rgba(242,213,124,0.2);
        font-size: 14px;
    }

    .arrow-up {
        color: lime;
    }

    .arrow-down {
        color: red;
    }

    .bottom-row {
        flex: 1;
        display: flex;
        gap: 20px;
    }

    .log-list {
        max-height: 200px;
        overflow-y: auto;
        font-size: 13px;
    }
</style>
</head>
<body>

<div class="sidebar">
    <h2>Lucky 13 Admin</h2>
    <div class="stat" id="stat-total-users">Total users: …</div>
    <div class="stat" id="stat-total-balance">Total balance: …</div>
    <div class="stat" id="stat-total-profit">Total casino profit: …</div>
</div>

<div class="main">
    <div class="top-row">
        <div class="panel">
            <h3>Users</h3>
            <table id="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody id="users-body"></tbody>
            </table>
        </div>

        <div class="panel">
            <h3>Games</h3>
            <div id="game-stats"></div>
        </div>
    </div>

    <div class="bottom-row">
        <div class="panel">
            <h3>Activity Log</h3>
            <div class="log-list" id="activity-log"></div>
        </div>
    </div>
</div>

<script src="https://gambling-site-production.up.railway.app/socket.io/socket.io.js"></script>
<script>
const API_BASE = "https://gambling-site-production.up.railway.app";
const socket = io(API_BASE);

// join admin room
socket.on("connect", () => {
    socket.emit("joinAdmin");
    addLog("Connected to admin socket: " + socket.id);
});

socket.on("adminUsersUpdate", users => {
    renderUsers(users);
    updateUserStats(users);
    addLog("Users updated (" + users.length + ")");
});

socket.on("adminGameStats", stats => {
    renderGameStats(stats);
    updateProfitStats(stats);
    addLog("Game stats updated");
});

function renderUsers(users) {
    const tbody = document.getElementById("users-body");
    tbody.innerHTML = "";
    users.forEach(u => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td>${u.balance}</td>
        `;
        tbody.appendChild(tr);
    });
}

function renderGameStats(stats) {
    const container = document.getElementById("game-stats");
    container.innerHTML = "";
    stats.forEach(row => {
        const profit = Number(row.total_profit || 0);
        const arrowClass = profit >= 0 ? "arrow-up" : "arrow-down";
        const arrowSymbol = profit >= 0 ? "↑" : "↓";

        const div = document.createElement("div");
        div.className = "game-row";
        div.innerHTML = `
            <span>${row.game}</span>
            <span>${profit} <span class="${arrowClass}">${arrowSymbol}</span></span>
        `;
        container.appendChild(div);
    });
}

function updateUserStats(users) {
    const totalUsers = users.length;
    const totalBalance = users.reduce((sum, u) => sum + Number(u.balance || 0), 0);

    document.getElementById("stat-total-users").textContent =
        "Total users: " + totalUsers;
    document.getElementById("stat-total-balance").textContent =
        "Total balance: " + totalBalance;
}

function updateProfitStats(stats) {
    const totalProfit = stats.reduce(
        (sum, row) => sum + Number(row.total_profit || 0),
        0
    );
    document.getElementById("stat-total-profit").textContent =
        "Total casino profit: " + totalProfit;
}

function addLog(msg) {
    const log = document.getElementById("activity-log");
    const line = document.createElement("div");
    line.textContent = new Date().toLocaleTimeString() + " – " + msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}
</script>

</body>
</html>
