<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: #f2d57c;
        overflow-x: hidden;
    }

    /* Gold glow */
    .glow {
        text-shadow: 0 0 10px #f2d57c, 0 0 20px #f2d57c, 0 0 30px #f2d57c;
    }

    header {
        background: #111;
        padding: 20px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        border-bottom: 2px solid #f2d57c;
    }

    .container {
        padding: 25px;
        max-width: 1100px;
        margin: auto;
    }

    .section {
        background: rgba(20, 20, 20, 0.9);
        padding: 20px;
        margin-bottom: 25px;
        border-radius: 12px;
        border: 2px solid #f2d57c;
        box-shadow: 0 0 20px rgba(242, 213, 124, 0.3);
    }

    .section h2 {
        margin-top: 0;
        font-size: 26px;
        color: #f2d57c;
    }

    button {
        background: #f2d57c;
        border: none;
        padding: 10px 20px;
        color: #000;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover {
        background: #c9b15f;
    }

    input {
        padding: 10px;
        width: 250px;
        border-radius: 6px;
        border: none;
        margin-right: 10px;
        background: #111;
        color: #f2d57c;
        border: 1px solid #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    table th, table td {
        padding: 10px;
        border-bottom: 1px solid #333;
        text-align: left;
    }

    .log-box {
        background: #000;
        padding: 10px;
        height: 250px;
        overflow-y: scroll;
        border: 1px solid #333;
        white-space: pre-wrap;
    }

    /* Floating gold particles */
    .particle {
        position: fixed;
        width: 6px;
        height: 6px;
        background: #f2d57c;
        border-radius: 50%;
        opacity: 0.7;
        animation: floatUp linear infinite;
        z-index: 0;
    }

    @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 0.8; }
        100% { transform: translateY(-120vh) scale(0.2); opacity: 0; }
    }
</style>
</head>
<body>

<!-- Gold particles -->
<script>
for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "vw";
    p.style.top = Math.random() * 100 + "vh";
    p.style.animationDuration = (Math.random() * 4 + 3) + "s";
    document.body.appendChild(p);
}
</script>

<header class="glow">Lucky 13 Admin Dashboard</header>

<div class="container">

    <!-- SITE STATS -->
    <div class="section">
        <h2>Site Stats</h2>
        <p id="statsOutput">Loading...</p>
        <button onclick="loadStats()">Refresh Stats</button>
    </div>

    <!-- USERS -->
    <div class="section">
        <h2>User List</h2>
        <table id="usersTable"></table>
        <button onclick="loadUsers()">Refresh Users</button>
    </div>

    <!-- GAME TOGGLE -->
    <div class="section">
        <h2>Game Controls</h2>
        <input id="gameName" placeholder="Game name (slots, blackjack, etc)">
        <button onclick="toggleGame()">Toggle Game</button>
        <p id="gameStatus"></p>
    </div>

    <!-- LOGS -->
    <div class="section">
        <h2>Server Logs</h2>
        <div class="log-box" id="logBox">Loading...</div>
        <button onclick="loadLogs()">Refresh Logs</button>
    </div>

    <!-- MAINTENANCE -->
    <div class="section">
        <h2>Maintenance Mode</h2>
        <button onclick="toggleMaintenance()">Toggle Maintenance</button>
        <p id="maintenanceStatus"></p>
    </div>

</div>

<script>
const API = "https://gambling-site-production.up.railway.app";

// Get admin key from login page
const urlParams = new URLSearchParams(window.location.search);
const ADMIN_KEY = urlParams.get("key");

// If no key → redirect back to login
if (!ADMIN_KEY) {
    window.location.href = "admin.html";
}

// ---------------------------------------------
// LOAD STATS
// ---------------------------------------------
function loadStats() {
    fetch(API + "/admin/stats", {
        headers: { "x-admin-key": ADMIN_KEY }
    })
    .then(res => {
        if (!res.ok) throw new Error("Invalid key");
        return res.json();
    })
    .then(data => {
        document.getElementById("statsOutput").innerText =
            `Total Users: ${data.totalUsers}
Total Balance: $${data.totalBalance}
Active Games: ${data.activeGames}`;
    })
    .catch(() => {
        alert("Invalid admin key");
        window.location.href = "admin.html";
    });
}

// ---------------------------------------------
// LOAD USERS
// ---------------------------------------------
function loadUsers() {
    fetch(API + "/admin/users", {
        headers: { "x-admin-key": ADMIN_KEY }
    })
    .then(res => {
        if (!res.ok) throw new Error("Invalid key");
        return res.json();
    })
    .then(users => {
        let html = `
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Balance</th>
                <th>Banned</th>
                <th>Actions</th>
            </tr>
        `;

        users.forEach(u => {
            html += `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>$${u.balance}</td>
                    <td>${u.banned}</td>
                    <td>
                        <button onclick="banUser(${u.id})">Ban</button>
                        <button onclick="unbanUser(${u.id})">Unban</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById("usersTable").innerHTML = html;
    })
    .catch(() => {
        alert("Invalid admin key");
        window.location.href = "admin.html";
    });
}

// BAN USER
function banUser(id) {
    fetch(API + "/admin/ban/" + id, {
        method: "POST",
        headers: { "x-admin-key": ADMIN_KEY }
    }).then(() => loadUsers());
}

// UNBAN USER
function unbanUser(id) {
    fetch(API + "/admin/unban/" + id, {
        method: "POST",
        headers: { "x-admin-key": ADMIN_KEY }
    }).then(() => loadUsers());
}

// ---------------------------------------------
// TOGGLE GAME
// ---------------------------------------------
function toggleGame() {
    const game = document.getElementById("gameName").value.trim();

    fetch(API + "/admin/toggle-game/" + game, {
        method: "POST",
        headers: { "x-admin-key": ADMIN_KEY }
    })
    .then(() => {
        document.getElementById("gameStatus").innerText = game + " toggled!";
    });
}

// ---------------------------------------------
// LOAD LOGS
// ---------------------------------------------
function loadLogs() {
    fetch(API + "/admin/logs", {
        headers: { "x-admin-key": ADMIN_KEY }
    })
    .then(res => res.text())
    .then(text => {
        document.getElementById("logBox").innerText = text;
    });
}

// ---------------------------------------------
// MAINTENANCE MODE
// ---------------------------------------------
function toggleMaintenance() {
    fetch(API + "/admin/maintenance", {
        method: "POST",
        headers: { "x-admin-key": ADMIN_KEY }
    })
    .then(() => {
        document.getElementById("maintenanceStatus").innerText =
            "Maintenance mode toggled!";
    });
}

// Initial load
loadStats();
loadUsers();
loadLogs();
</script>

</body>
</html>
