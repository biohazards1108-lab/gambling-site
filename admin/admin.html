<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: 'Arial', sans-serif;
        color: #f2d57c;
        overflow: hidden;
    }

    .glow {
        text-shadow: 0 0 10px #f2d57c, 0 0 20px #f2d57c, 0 0 30px #f2d57c;
    }

    .login-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 20, 0.9);
        padding: 40px;
        border-radius: 12px;
        border: 2px solid #f2d57c;
        width: 350px;
        text-align: center;
        box-shadow: 0 0 25px rgba(242, 213, 124, 0.4);
    }

    .login-container h1 {
        margin-bottom: 25px;
        font-size: 32px;
    }

    input {
        width: 90%;
        padding: 12px;
        margin-top: 15px;
        border-radius: 8px;
        border: none;
        background: #111;
        color: #f2d57c;
        font-size: 16px;
        outline: none;
        border: 1px solid #333;
    }

    input:focus {
        border-color: #f2d57c;
        box-shadow: 0 0 10px #f2d57c;
    }

    button {
        margin-top: 20px;
        width: 95%;
        padding: 12px;
        background: #f2d57c;
        border: none;
        border-radius: 8px;
        color: #000;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #c9b15f;
    }

    #loginStatus {
        margin-top: 15px;
        font-size: 16px;
        color: #ff4444;
    }

    .particle {
        position: fixed;
        width: 6px;
        height: 6px;
        background: #f2d57c;
        border-radius: 50%;
        opacity: 0.7;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 0.8; }
        100% { transform: translateY(-120vh) scale(0.2); opacity: 0; }
    }
</style>
</head>
<body>

<script>
for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "vw";
    p.style.top = Math.random() * 100 + "vh";
    p.style.animationDuration = (Math.random() * 4 + 3) + "s";
    document.body.appendChild(p);
}
</script>

<div class="login-container">
    <h1 class="glow">Lucky 13 Admin</h1>

    <input id="adminKey" type="password" placeholder="Admin Key">

    <button onclick="adminLogin()">Login</button>

    <p id="loginStatus"></p>
</div>

<script>
const API = "https://gambling-site-production.up.railway.app";

// Validate admin key using /api/admin/login
function adminLogin() {
    const key = document.getElementById("adminKey").value.trim();
    const status = document.getElementById("loginStatus");

    if (!key) {
        status.innerText = "Enter admin key.";
        return;
    }

    fetch(API + "/api/admin/login", {
        headers: { "x-admin-key": key }
    })
    .then(res => {
        if (!res.ok) throw new Error("Invalid key");

        // Redirect to dashboard with key in URL
        window.location.href = "dashboard.html?key=" + key;
    })
    .catch(() => {
        status.innerText = "Invalid admin key.";
    });
}
</script>

</body>
</html>
