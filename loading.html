<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Lucky 13 Casino – Loading</title>
    <link rel="stylesheet" href="loading.css" />

    <style>
        /* --- BASIC RESET --- */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        #loading-root {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* --- CURTAINS --- */
        .curtain {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(#d4af37, #b8860b);
            z-index: 10;
            transition: transform 2s ease-in-out;
        }

        .curtain-left {
            left: 0;
            transform: translateX(0);
        }

        .curtain-right {
            right: 0;
            transform: translateX(0);
        }

        .curtain-open-left {
            transform: translateX(-100%);
        }

        .curtain-open-right {
            transform: translateX(100%);
        }

        /* --- CENTER TITLE --- */
        .loading-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: gold;
            z-index: 5;
        }

        .loading-title {
            font-size: 2rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px gold;
        }

        .enter-button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 1.2rem;
            background: gold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .enter-button.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="loading-root">

        <!-- Curtains -->
        <div class="curtain curtain-left"></div>
        <div class="curtain curtain-right"></div>

        <!-- Center Title -->
        <div class="loading-center">
            <h1 class="loading-title">WELCOME TO THE LUCKY 13 CASINO</h1>
            <button id="enter-btn" class="enter-button">Enter Casino</button>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const leftCurtain = document.querySelector(".curtain-left");
            const rightCurtain = document.querySelector(".curtain-right");
            const enterBtn = document.getElementById("enter-btn");

            // 1. Play curtain opening animation
            setTimeout(() => {
                leftCurtain.classList.add("curtain-open-left");
                rightCurtain.classList.add("curtain-open-right");
            }, 500);

            // 2. Reveal Enter button
            setTimeout(() => {
                enterBtn.classList.add("show");
            }, 2000);

            // 3. Auto‑redirect after animation
            setTimeout(() => {
       window.location.href = "/gambling-site/index.html";

            }, 3500);

            // 4. Manual button click
            enterBtn.addEventListener("click", () => {
            window.location.href = "/gambling-site/index.html";

            });
        });
    </script>
</body>
</html>
