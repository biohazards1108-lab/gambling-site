<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }
    .spinner {
        width: 60px;
        height: 60px;
        border: 6px solid #333;
        border-top-color: #f00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
</head>
<body>

<div class="spinner"></div>
<h2>Loading Lucky 13 Casino...</h2>

<script>
// ------------------------------
// FIXED LOADING LOGIC
// ------------------------------

const token = localStorage.getItem("token");

// If no token → user is not logged in → send to login/register
if (!token) {
    window.location.href = "login.html";   // or register.html
} else {
    // Token exists → send to games
    window.location.href = "game/index.html";   // change to your actual games page
}
</script>

</body>
</html>
