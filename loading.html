<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading Lucky 13...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #f2d57c;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        overflow: hidden;
    }

    .logo {
        font-size: 48px;
        font-weight: bold;
        letter-spacing: 4px;
        text-shadow: 0 0 10px #f2d57c, 0 0 20px #f2d57c;
        margin-bottom: 20px;
    }

    .spinner {
        width: 80px;
        height: 80px;
        border: 6px solid #333;
        border-top-color: #f2d57c;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Falling coins */
    .coin {
        position: fixed;
        top: -50px;
        width: 40px;
        height: 40px;
        background-image: url("assets/images/coin.png");
        background-size: cover;
        animation: fall linear infinite;
        opacity: 0.8;
    }

    @keyframes fall {
        0% { transform: translateY(-100px) rotate(0deg); }
        100% { transform: translateY(110vh) rotate(360deg); }
    }
</style>
</head>
<body>

<div class="logo">Lucky 13 Casino</div>
<div class="spinner"></div>

<script>
// Falling coins
for (let i = 0; i < 20; i++) {
    const coin = document.createElement("div");
    coin.classList.add("coin");
    coin.style.left = Math.random() * 100 + "vw";
    coin.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(coin);
}
</script>

<script src="loading.js"></script>
</body>
</html>
