<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky 13 Casino – Loading</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: "Segoe UI", sans-serif;
    }

    /* Curtains */
    .curtain {
        position: fixed;
        top: 0;
        width: 50%;
        height: 100%;
        background: linear-gradient(to bottom, #2b0000, #000);
        z-index: 10;
        transition: transform 2.5s ease-in-out;
    }
    .left { left: 0; transform: translateX(0); }
    .right { right: 0; transform: translateX(0); }

    /* Center logo reveal */
    .logo-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        opacity: 0;
        transition: opacity 2s ease-in-out 1.5s;
    }

    .logo-title {
        font-size: 3rem;
        color: #f5c451;
        text-shadow: 0 0 20px #f5c451;
        letter-spacing: 0.1em;
        margin-bottom: 20px;
        text-transform: uppercase;
    }

    .subtext {
        font-size: 1rem;
        color: #d4a63f;
        margin-bottom: 30px;
    }

    /* Buttons */
    .btn {
        display: inline-block;
        padding: 12px 28px;
        margin: 10px;
        font-size: 1rem;
        border-radius: 999px;
        border: 2px solid #f5c451;
        background: #000;
        color: #f5c451;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn:hover {
        background: #f5c451;
        color: #000;
    }

    /* Skull logo placeholder */
    .skull {
        width: 180px;
        height: 180px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background-size: cover;
        background-position: center;
        box-shadow: 0 0 25px #f00;
    }
</style>
</head>
<body>

<!-- Curtains -->
<div class="curtain left"></div>
<div class="curtain right"></div>

<!-- Logo Reveal -->
<div class="logo-container" id="logoReveal">
    <div class="skull" style="background-image:url('skull.png');"></div>
    <div class="logo-title">Lucky 13 Casino</div>
    <div class="subtext">Shadow Gambler Edition</div>

    <button class="btn" onclick="location.href='login.html'">Login</button>
    <button class="btn" onclick="location.href='register.html'">Create Account</button>
</div>

<script>
    // Open curtains
    setTimeout(() => {
        document.querySelector('.left').style.transform = "translateX(-100%)";
        document.querySelector('.right').style.transform = "translateX(100%)";
    }, 500);

    // Fade in logo
    setTimeout(() => {
        document.getElementById("logoReveal").style.opacity = 1;
    }, 1500);
</script>

</body>
</html>
