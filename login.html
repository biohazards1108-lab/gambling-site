<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lucky 13 Casino – Login</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at top, #0a0a0a 0%, #000 60%, #000 100%);
        color: #f9f3d7;
    }

    .login-wrapper {
        max-width: 460px;
        margin: 60px auto;
        background: #050608;
        border: 1px solid #262626;
        border-radius: 16px;
        padding: 32px;
        text-align: center;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
    }

    .title {
        font-size: 1.6rem;
        color: #f5c451;
        margin-bottom: 6px;
    }

    .subtitle {
        font-size: 0.9rem;
        color: #d0c7ff;
        margin-bottom: 24px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 14px;
        border-radius: 8px;
        border: 1px solid #3a3a3a;
        background: #101010;
        color: #f9f3d7;
        font-size: 1rem;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(90deg, #f5c451, #d4a63f);
        color: #000;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 10px;
    }

    .msg {
        margin-top: 16px;
        font-size: 0.9rem;
    }

    a {
        color: #f5c451;
        text-decoration: none;
    }
</style>
</head>
<body>

<div class="login-wrapper">
    <div class="title">Welcome Back</div>
    <div class="subtitle">Login to Lucky 13 Casino</div>

    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />

    <button class="btn" onclick="login()">Login</button>

    <div class="msg" id="msg"></div>

    <p style="margin-top:20px;">
        No account? <a href="register.html">Register here</a>
    </p>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    if (!username || !password) {
        msg.textContent = "Please fill out all fields.";
        msg.style.color = "red";
        return;
    }

    try {
        const res = await fetch("https://gambling-site-production.up.railway.app/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.token) {
            localStorage.setItem("token", data.token);
            msg.textContent = "Login successful! Redirecting...";
            msg.style.color = "lime";

            setTimeout(() => {
                window.location.href = "index.html"; // casino homepage
            }, 1200);
        } else {
            msg.textContent = data.error || "Login failed.";
            msg.style.color = "red";
        }
    } catch (err) {
        msg.textContent = "Server error.";
        msg.style.color = "red";
    }
}
</script>

</html>
