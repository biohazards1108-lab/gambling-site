<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>High Roller Lounge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Audio: background music + SFX -->
  <audio id="bgMusic" src="assets/casino-music.mp3" loop></audio>
  <audio id="chipSound" src="assets/chip.wav"></audio>
  <audio id="cardSound" src="assets/card.wav"></audio>
  <audio id="spinSound" src="assets/spin.wav"></audio>

  <header class="site-header">
    <div class="logo">High Roller Lounge</div>

    <nav class="nav-bar">
      <button data-game="blackjack">Blackjack</button>
      <button data-game="twentyone">21</button>
      <button data-game="texas">Texas Hold'em</button>
      <button data-game="slots3">3-Reel Slots</button>
      <button data-game="slots5">5-Reel Slots</button>
      <button data-game="highrollerSlots">High Roller Slots</button>
      <button data-game="rouletteEU">Roulette (EU)</button>
      <button data-game="rouletteUS">Roulette (US)</button>
      <button data-game="videoPoker">Video Poker</button>
      <button data-game="baccarat">Baccarat</button>
      <button data-game="craps">Craps</button>
      <button data-game="coinFlip">Coin Flip</button>
      <button data-game="diceDuel">Dice Duel</button>
      <button data-game="keno">Keno</button>
      <button data-game="wheel">Wheel of Fortune</button>
    </nav>

    <div class="wallet">
      <div class="player-switch">
        Active player:
        <select id="playerSelect">
          <option value="player1">Player 1</option>
          <option value="player2">Player 2</option>
        </select>
      </div>
      <div>
        Tokens: <span id="balance">0</span>
        <button id="resetBalanceBtn">Reset to 200</button>
      </div>
      <button id="startAudioBtn" class="start-audio">Enter Casino</button>
    </div>
  </header>

  <main class="main-layout">
    <aside class="side-panel">
      <h2>Dealer Notes</h2>
      <p class="small">
        Tokens are virtual. Each player has their own wallet saved in this browser.
      </p>
      <div id="gameInfo"></div>
    </aside>

    <section class="game-panel">
      <div id="gameTitle" class="game-title">Select a table from the bar above</div>
      <div id="gameContainer" class="game-container"></div>
      <div id="gameLog" class="game-log"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
